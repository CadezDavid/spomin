services:
  neo4j:
    image: neo4j:5
    environment:
      NEO4J_AUTH: neo4j/password
    ports:
      - "7474:7474"   # browser UI
      - "7687:7687"   # bolt protocol
    volumes:
      - neo4j_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p password 'RETURN 1' > /dev/null 2>&1"]
      interval: 5s
      timeout: 10s
      retries: 10
      start_period: 30s

  spomin:
    build: .
    ports:
      - "8084:8084"
    env_file: .env
    depends_on:
      neo4j:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

volumes:
  neo4j_data: